name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'dashboard.html'
      - 'signals.json'

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir _site
          cp dashboard.html _site/index.html
          cp signals.json _site/signals.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
